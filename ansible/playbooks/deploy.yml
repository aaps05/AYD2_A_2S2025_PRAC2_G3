# ─── Frontend ─────────────────────────────────────────────────────────────────
- name: Deploy Frontend
  hosts: frontend
  become: yes

  tasks:
    - name: Authenticate Docker to ECR
      shell: |
        aws ecr get-login-password --region {{ aws_region }} | \
        docker login --username AWS --password-stdin \
        {{ ecr_frontend_url | regex_replace('(/[^/]+)$', '') }}
      environment:
        AWS_DEFAULT_REGION: "{{ aws_region }}"

    - name: Pull Frontend image
      community.docker.docker_image:
        name: "{{ ecr_frontend_url }}:latest"
        source: pull
        force_source: yes

    - name: Stop and remove old container (if exists)
      community.docker.docker_container:
        name: frontend
        state: absent
      ignore_errors: yes

    - name: Run Frontend container (nginx acts as API Gateway)
      community.docker.docker_container:
        name: frontend
        image: "{{ ecr_frontend_url }}:latest"
        state: started
        restart_policy: always
        published_ports:
          - "80:80"
        env:
          MEDICAL_SERVICES_HOST: "{{ medical_services_private_ip }}"
          SPECIALTIES_HOST: "{{ specialties_private_ip }}"
